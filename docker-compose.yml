services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - editor
      - viewer

  editor:
    build:
      context: ./editor
      dockerfile: Dockerfile
      args:
        - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL:-http://localhost:8090}
    depends_on:
      - pocketbase

  viewer:
    build:
      context: ./viewer
      dockerfile: Dockerfile

  pocketbase:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - VERSION=0.36.9
    ports:
      - "8090:8090"
    volumes:
      - /DATA/monojournal/pocketbase/data:/pb_data
      - ./backend/DATA/pocketbase/pb_public:/pb_public
      - ./backend/DATA/pocketbase/pb_hooks:/pb_hooks
      - ./backend/DATA/pocketbase/pb_migrations:/pb_migrations
