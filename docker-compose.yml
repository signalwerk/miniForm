services:
  web:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
      args:
        - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL:-http://localhost:8090}
    ports:
      - "80:80"
    depends_on:
      - pocketbase

  pocketbase:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - VERSION=0.36.9
    ports:
      - "8090:8090"
    volumes:
      - /DATA/monojournal/pocketbase/data:/pb_data
      - ./backend/DATA/pocketbase/pb_public:/pb_public
      - ./backend/DATA/pocketbase/pb_hooks:/pb_hooks
      - ./backend/DATA/pocketbase/pb_migrations:/pb_migrations
