services:
  web:
    build: !reset null
    image: nginx:1.27-alpine
    ports: !override
      - "80:80"
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - editor
      - viewer

  editor:
    build:
      context: ./editor
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
      - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL:-http://localhost:8090}
    volumes:
      - ./editor:/app
      - /app/node_modules
    command: sh -lc "npm ci && npm run dev"

  viewer:
    build:
      context: ./viewer
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
    volumes:
      - ./viewer:/app
      - /app/node_modules
    command: sh -lc "npm ci && npm run dev"

  pocketbase:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        - VERSION=0.36.9
    ports:
      - "8090:8090"
    volumes:
      - ${DATA_PATH:-./backend/DATA}/pocketbase/pb_data:/pb_data
      - ${DATA_PATH:-./backend/DATA}/pocketbase/pb_public:/pb_public
      - ${DATA_PATH:-./backend/DATA}/pocketbase/pb_hooks:/pb_hooks
      - ${DATA_PATH:-./backend/DATA}/pocketbase/pb_migrations:/pb_migrations
