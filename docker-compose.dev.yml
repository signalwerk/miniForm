services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=development
      - POCKETBASE_URL=http://pocketbase:8090
      - NEXT_PUBLIC_POCKETBASE_URL=http://monojournal.localhost.signalwerk.ch:8090
      - POCKETBASE_USERS_COLLECTION=${POCKETBASE_USERS_COLLECTION:-users}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-secret}
      - SITE_PROJECT_ID=${SITE_PROJECT_ID:-}
    depends_on:
      - pocketbase
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -lc "npm ci && npm run dev"

  pocketbase:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        - VERSION=0.34.2
    ports:
      - "8090:8090"
    volumes:
      - ${DATA_PATH:-./backend/DATA}/pocketbase/pb_data:/pb_data
      - ${DATA_PATH:-./backend/DATA}/pocketbase/pb_public:/pb_public
      - ${DATA_PATH:-./backend/DATA}/pocketbase/pb_hooks:/pb_hooks
      - ${DATA_PATH:-./backend/DATA}/pocketbase/pb_migrations:/pb_migrations
